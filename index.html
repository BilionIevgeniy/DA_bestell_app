<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="scripts/script.js" type="module"></script>
  <link rel="stylesheet" href="styles/style.css">
  <link rel="icon" type="image/x-icon" href="assets/logo/logo.png">
  <title>Title</title>
</head>
<body>
  <header class="header">
    <div class="header-top">
      <div class="header-top-wrapper container">
        <div class="logo">
          <img src="assets/logo/LogoSmall.png" alt="Logo">
        </div>
        <button class="burger-menu"><img src="assets/logo/menu.png" alt="Menu Batton"></button>
      </div>
    </div>
    <div class="header-img"></div>
  </header>
  <main>
    <div class="main-description">
      <div class="central-img">
        <img src="assets/logo/logo.png" alt="Logo">
      </div>
      <div class="title">
        <h1><span>Burger</span>House</h1>
        <div class="rank">
          <img src="assets/logo/star.png" alt="rank"> 4.1 <span>(317)</span>
        </div>
      </div>
      <p>The best of Burgers, Pizza, and Greens, all in one great place.</p>
    </div>
    <div class="menu">
      <div class="basket-wrapper">

      </div>
      <div class="menu-wrapper">

      </div>
    </div>

  </main>
  <div data-action="openBasket" class="shoping_cart">
    <span>5</span>
    <img src="assets/logo/shopping_cart.png" alt="shoping cart">
  </div>
  <div class="footer"></div>
  <div class="modal">
    <div class="modal-content">
      <div data-action="closeModal" class="close_modal"><button>x</button></div>
      <div class="modal-img">
        <img src="assets/logo/popup_img.png" alt="popup img">
      </div>
      <h3>Order Confirmed!</h3>
      <p>Your food is on the way!</p>
    </div>
  </div>

</body>
</html>
